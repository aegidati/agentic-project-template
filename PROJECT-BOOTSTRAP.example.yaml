# Optional explicit starter override.
# If this section is filled, it should take precedence over the selected profile.
# Leave repo: null for starters that are not required.
starters:
  backend:
    repo: null
    path: app/backend
  web:
    repo: null
    path: app/web
  client:
    repo: null
    path: app/client
  contracts:
    repo: null
    path: app/contracts
  infra:
    repo: null
    path: app/infra
  composition:
    repo: null
    path: app/composition

rules:
  starter_resolution:
    - "If project.profile is set, resolve starters from profiles.<profile>.starters"
    - "If starters.*.repo is explicitly set, it overrides the profile value"
    - "If both profile and manual starters are empty, project bootstrap is not ready"
    - "Only starters with repo != null should be installed"
  installation_order:
    - contracts
    - backend
    - web
    - client
    - infra
    - composition

architecture:
  adr_001_created: false
  architecture_snapshot_created: false

agents:
  enabled:
    - feature-orchestrator
    - architecture-guardian
    - documentation-guardian
    - test-designer
    - ux-navigator
    - domain-template-agent
    - starter-installer
    - project-auditor